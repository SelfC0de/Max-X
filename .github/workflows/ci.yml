name: Build Max-X

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Тег версии (например: v1.0.1)'
        required: true
        default: 'v1.0.0'
      release_notes:
        description: 'Описание релиза'
        required: false
        default: 'Pre-release build'

jobs:
  build:
    name: Build APK → Pre-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Generate debug keystore for signing
        run: |
          keytool -genkeypair \
            -keystore maxx-release.jks \
            -alias maxx \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass maxxrelease \
            -keypass maxxrelease \
            -dname "CN=Max-X, OU=Dev, O=SelfCode, L=RU, S=RU, C=RU" \
            -noprompt

      - name: Sign APK
        run: |
          $JAVA_HOME/bin/jarsigner \
            -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore maxx-release.jks \
            -storepass maxxrelease \
            -keypass maxxrelease \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            maxx

      - name: Align and rename APK → Max-X.apk
        run: |
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)/zipalign \
            -v 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            Max-X.apk

      - name: Create GitHub Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_tag }}
          name: "Max-X ${{ github.event.inputs.version_tag }}"
          body: ${{ github.event.inputs.release_notes }}
          prerelease: true
          files: Max-X.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
