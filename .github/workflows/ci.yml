name: Build Max-X

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Тег версии (например: v1.0.1)'
        required: true
        default: 'v1.0.0'
      release_notes:
        description: 'Описание релиза'
        required: false
        default: 'Pre-release build'

jobs:
  build:
    name: Build APK → Pre-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -keystore ${{ runner.temp }}/maxx-release.jks \
            -alias maxx \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass maxxrelease123 \
            -keypass maxxrelease123 \
            -dname "CN=Max-X,OU=Dev,O=SelfCode,L=RU,S=RU,C=RU" \
            -noprompt

      - name: Build signed Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          RELEASE_STORE_FILE:     ${{ runner.temp }}/maxx-release.jks
          RELEASE_STORE_PASSWORD: maxxrelease123
          RELEASE_KEY_ALIAS:      maxx
          RELEASE_KEY_PASSWORD:   maxxrelease123

      - name: Rename APK → Max-X.apk
        run: cp app/build/outputs/apk/release/app-release.apk Max-X.apk

      - name: Create GitHub Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ github.event.inputs.version_tag }}
          name:       "Max-X ${{ github.event.inputs.version_tag }}"
          body:       ${{ github.event.inputs.release_notes }}
          prerelease: true
          files:      Max-X.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
